<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوری - نئے طالب علم کا اندراج</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/add_student.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-lightbulb"></i> نوری</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../index.html"><i class="fas fa-tachometer-alt"></i> <span>ڈیش بورڈ</span></a></li>
                    <li class="active"><a href="student_listing.html"><i class="fas fa-user-graduate"></i> <span>طلبہ</span></a></li>
                    <li><a href="attendance.html"><i class="fas fa-calendar-check"></i> <span>حاضری</span></a></li>
                    <li><a href="fees.html"><i class="fas fa-money-bill-wave"></i> <span>فیس</span></a></li>
                    <li><a href="exams.html"><i class="fas fa-book"></i> <span>امتحانات</span></a></li>
                    <li><a href="timetable.html"><i class="fas fa-clock"></i> <span>ٹائم ٹیبل</span></a></li>
                    <li><a href="library.html"><i class="fas fa-book-open-reader"></i> <span>لائبریری</span></a></li>
                    <li><a href="transport.html"><i class="fas fa-bus"></i> <span>ٹرانسپورٹ</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-bar"></i> <span>رپورٹس</span></a></li>
                    <li><a href="settings.html"><i class="fas fa-cog"></i> <span>ترتیبات</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-title">
                    <h1>نئے طالب علم کا اندراج</h1>
                </div>
                <div class="header-user">
                    <img src="https://via.placeholder.com/50" alt="User Avatar" class="user-avatar">
                </div>
            </header>

            <!-- Content Area -->
            <section class="content-area">
                <div class="student-form-container">
                    <form id="add-student-form">
                        <div class="form-section">
                            <h3>ذاتی معلومات</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="full-name">پورا نام</label>
                                    <input type="text" id="full-name" required>
                                </div>
                                <div class="form-group">
                                    <label for="dob">تاریخ پیدائش</label>
                                    <input type="date" id="dob" required>
                                </div>
                                <div class="form-group">
                                    <label for="gender">جنس</label>
                                    <select id="gender" required>
                                        <option value="male">لڑکا</option>
                                        <option value="female">لڑکی</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3>تعلیمی معلومات</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="roll-no">رول نمبر</label>
                                    <input type="text" id="roll-no" required>
                                </div>
                                <div class="form-group">
                                    <label for="class">کلاس</label>
                                    <input type="text" id="class" required>
                                </div>
                                <div class="form-group">
                                    <label for="admission-date">داخلے کی تاریخ</label>
                                    <input type="date" id="admission-date" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3>رابطے کی معلومات</h3>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="father-name">والد کا نام</label>
                                    <input type="text" id="father-name" required>
                                </div>
                                <div class="form-group">
                                    <label for="phone-number">فون نمبر</label>
                                    <input type="tel" id="phone-number" required>
                                </div>
                                <div class="form-group address-group">
                                    <label for="address">پتہ</label>
                                    <input type="text" id="address" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit">طالب علم شامل کریں</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script src="../js/add_student.js"></script>
</body>
</html>
