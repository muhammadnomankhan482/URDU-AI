<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوری - ترتیبات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/settings.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-lightbulb"></i> نوری</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../index.html"><i class="fas fa-tachometer-alt"></i> <span>ڈیش بورڈ</span></a></li>
                    <li><a href="student_listing.html"><i class="fas fa-user-graduate"></i> <span>طلبہ</span></a></li>
                    <li><a href="attendance.html"><i class="fas fa-calendar-check"></i> <span>حاضری</span></a></li>
                    <li><a href="fees.html"><i class="fas fa-money-bill-wave"></i> <span>فیس</span></a></li>
                    <li><a href="exams.html"><i class="fas fa-book"></i> <span>امتحانات</span></a></li>
                    <li><a href="timetable.html"><i class="fas fa-clock"></i> <span>ٹائم ٹیبل</span></a></li>
                    <li><a href="library.html"><i class="fas fa-book-open-reader"></i> <span>لائبریری</span></a></li>
                    <li><a href="transport.html"><i class="fas fa-bus"></i> <span>ٹرانسپورٹ</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-bar"></i> <span>رپورٹس</span></a></li>
                    <li class="active"><a href="settings.html"><i class="fas fa-cog"></i> <span>ترتیبات</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>عمومی ترتیبات</h1>
                </div>
                <div class="header-user">
                    <img src="https://via.placeholder.com/50" alt="User Avatar" class="user-avatar">
                </div>
            </header>

            <section class="content-area">
                <div class="settings-container">
                    <h3>اسکول کی معلومات</h3>
                    <div class="form-container">
                        <div class="form-group">
                            <label for="school-name">اسکول کا نام</label>
                            <input type="text" id="school-name" placeholder="اسکول کا نام درج کریں">
                        </div>
                         <div class="form-group">
                            <label for="school-address">پتہ</label>
                            <input type="text" id="school-address" placeholder="اسکول کا پتہ درج کریں">
                        </div>
                        <div class="form-group">
                            <label for="school-phone">فون نمبر</label>
                            <input type="text" id="school-phone" placeholder="اسکول کا فون نمبر درج کریں">
                        </div>
                        <div class="form-group">
                            <label for="school-email">ای میل</label>
                            <input type="email" id="school-email" placeholder="اسکول کا ای میل درج کریں">
                        </div>
                        <div class="form-group">
                            <label for="currency-symbol">کرنسی کی علامت</label>
                            <input type="text" id="currency-symbol" placeholder="مثلاً Rs, $, €">
                        </div>
                        <button id="save-settings-btn">ترتیبات محفوظ کریں</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="../js/settings.js"></script>
</body>
</html>
