<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوری - ٹائم ٹیبل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/timetable.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-lightbulb"></i> نوری</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../index.html"><i class="fas fa-tachometer-alt"></i> <span>ڈیش بورڈ</span></a></li>
                    <li><a href="student_listing.html"><i class="fas fa-user-graduate"></i> <span>طلبہ</span></a></li>
                    <li><a href="attendance.html"><i class="fas fa-calendar-check"></i> <span>حاضری</span></a></li>
                    <li><a href="fees.html"><i class="fas fa-money-bill-wave"></i> <span>فیس</span></a></li>
                    <li><a href="exams.html"><i class="fas fa-book"></i> <span>امتحانات</span></a></li>
                    <li class="active"><a href="timetable.html"><i class="fas fa-clock"></i> <span>ٹائم ٹیبل</span></a></li>
                    <li><a href="library.html"><i class="fas fa-book-open-reader"></i> <span>لائبریری</span></a></li>
                    <li><a href="transport.html"><i class="fas fa-bus"></i> <span>ٹرانسپورٹ</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-chart-bar"></i> <span>رپورٹس</span></a></li>
                    <li><a href="settings.html"><i class="fas fa-cog"></i> <span>ترتیبات</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-title">
                    <h1>کلاس ٹائم ٹیبل</h1>
                </div>
                <div class="header-user">
                    <img src="https://via.placeholder.com/50" alt="User Avatar" class="user-avatar">
                </div>
            </header>

            <!-- Content Area -->
            <section class="content-area">
                <div class="timetable-container">
                    <div class="timetable-controls">
                        <select id="class-selector">
                            <option value="">کلاس منتخب کریں</option>
                        </select>
                        <button id="add-period-btn">نیا پیریڈ شامل کریں</button>
                    </div>
                    <div id="timetable-grid" class="timetable-grid"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for adding/editing periods -->
    <div id="period-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3 id="modal-title">پیریڈ شامل کریں/ترمیم کریں</h3>
            <form id="period-form">
                <input type="hidden" id="period-id">
                <div class="form-group">
                    <label for="day-selector">دن</label>
                    <select id="day-selector" required></select>
                </div>
                <div class="form-group">
                    <label for="time-selector">وقت</label>
                    <select id="time-selector" required></select>
                </div>
                <div class="form-group">
                    <label for="subject-input">مضمون</label>
                    <input type="text" id="subject-input" placeholder="مضمون کا نام" required>
                </div>
                <div class="form-group">
                    <label for="teacher-input">استاد</label>
                    <input type="text" id="teacher-input" placeholder="استاد کا نام" required>
                </div>
                <div class="form-actions">
                    <button type="submit" id="save-period-btn">محفوظ کریں</button>
                    <button type="button" id="delete-period-btn" class="delete-btn">حذف کریں</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/timetable.js"></script>
</body>
</html>
