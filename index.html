<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نوری - اسکول مینجمنٹ سوفٹ ویئر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-lightbulb"></i> نوری</h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="index.html"><i class="fas fa-tachometer-alt"></i> <span>ڈیش بورڈ</span></a></li>
                    <li><a href="pages/student_listing.html"><i class="fas fa-user-graduate"></i> <span>طلبہ</span></a></li>
                    <li><a href="pages/attendance.html"><i class="fas fa-calendar-check"></i> <span>حاضری</span></a></li>
                    <li><a href="pages/fees.html"><i class="fas fa-money-bill-wave"></i> <span>فیس</span></a></li>
                    <li><a href="pages/exams.html"><i class="fas fa-book"></i> <span>امتحانات</span></a></li>
                    <li><a href="pages/timetable.html"><i class="fas fa-clock"></i> <span>ٹائم ٹیبل</span></a></li>
                    <li><a href="pages/library.html"><i class="fas fa-book-open-reader"></i> <span>لائبریری</span></a></li>
                    <li><a href="pages/transport.html"><i class="fas fa-bus"></i> <span>ٹرانسپورٹ</span></a></li>
                    <li><a href="pages/reports.html"><i class="fas fa-chart-bar"></i> <span>رپورٹس</span></a></li>
                    <li><a href="pages/settings.html"><i class="fas fa-cog"></i> <span>ترتیبات</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-title">
                    <h1>ڈیش بورڈ</h1>
                </div>
                <div class="header-user">
                    <img src="https://via.placeholder.com/50" alt="User Avatar" class="user-avatar">
                </div>
            </header>

            <!-- Content Area -->
            <section class="content-area">
                <!-- Quick Stats -->
                <div class="quick-stats">
                    <div class="stat-card">
                        <div class="stat-icon students">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <div class="stat-info">
                            <p>کل طلبہ</p>
                            <h3 id="total-students">٠</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon teachers">
                            <i class="fas fa-chalkboard-teacher"></i>
                        </div>
                        <div class="stat-info">
                            <p>کل اساتذہ</p>
                            <h3>١٥</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon earnings">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="stat-info">
                            <p>کل آمدنی</p>
                            <h3 id="total-revenue">٠</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon events">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                        <div class="stat-info">
                            <p>آنے والے واقعات</p>
                            <h3>٣</h3>
                        </div>
                    </div>
                </div>

                <!-- Charts and Summaries -->
                <div class="main-charts">
                    <div class="chart-container">
                        <h4>آمدنی کا جائزہ</h4>
                        <canvas id="revenueChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h4>طلبہ کی حاضری</h4>
                        <canvas id="attendanceChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
